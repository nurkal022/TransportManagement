<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход · Gulim Logistics</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS (тема) -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body{
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:
              radial-gradient(1200px 500px at 50% -10%, rgba(36,86,200,.10), transparent 60%),
              var(--tm-plane);
            padding:1.5rem;
        }
        .login-container{
            max-width:400px;width:100%;padding:2.2rem 2rem;
            background:var(--tm-surface);border:1px solid var(--tm-border);
            border-radius:18px;box-shadow:var(--tm-shadow-lg);
        }
        .login-header{text-align:center;margin-bottom:1.6rem}
        .login-logo{
            width:64px;height:64px;margin:0 auto .9rem;padding:8px;
            background:#fff;border:1px solid var(--tm-border);
            border-radius:16px;display:flex;align-items:center;justify-content:center;
            box-shadow:0 6px 18px rgba(21,23,27,.12);
        }
        .login-logo img{width:100%;height:100%;object-fit:contain}
        .login-header h2{font-weight:750;letter-spacing:-.02em;margin:0}
        .login-header .eyebrow{
            font-family:var(--tm-mono);font-size:.68rem;letter-spacing:.18em;
            text-transform:uppercase;color:var(--tm-accent);margin-bottom:.15rem;
        }
        .login-header p{margin:.35rem 0 0;color:var(--tm-muted);font-size:.9rem}
        .form-floating{margin-bottom:1rem}
        .btn-login{width:100%;padding:.7rem;font-weight:600}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="Gulim Logistics"></div>
            <div class="eyebrow">Transport &middot; Астана</div>
            <h2>Gulim Logistics</h2>
            <p>Войдите, чтобы продолжить</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-floating">
                <input type="text" class="form-control" id="username" name="username" placeholder="Имя пользователя" required>
                <label for="username">Имя пользователя</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
                <label for="password">Пароль</label>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Войти
            </button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
